server:
  port: 8080

spring:
  application:
    name: asset-management

  datasource:
    url: jdbc:postgresql://localhost:5432/asset_management
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-in-production-please-make-it-long-enough-256bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24h
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

logging:
  level:
    com.company.assetmanagement: INFO
    org.springframework.security: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
